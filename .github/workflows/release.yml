name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build & publish Tauri release
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm run tauri build

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $v = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          echo "version=$v" >> $env:GITHUB_OUTPUT

      - name: Generate latest.json
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $sigFile = Get-ChildItem -Path src-tauri/target/release/bundle/nsis -Filter "*.exe.sig" | Select-Object -First 1
          $exeFile = Get-ChildItem -Path src-tauri/target/release/bundle/nsis -Filter "*-setup.exe" | Select-Object -First 1
          $signature = Get-Content $sigFile.FullName -Raw
          $tag = "v$version"
          $url = "https://github.com/${{ github.repository }}/releases/download/$tag/$($exeFile.Name)"
          $json = @{
            version = $version
            notes = "See release notes"
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature.Trim()
                url = $url
              }
            }
          } | ConvertTo-Json -Depth 6
          $json | Out-File -FilePath latest.json -Encoding utf8 -NoNewline

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: |
            src-tauri/target/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/bundle/nsis/*-setup.exe.sig
            latest.json
          generate_release_notes: true
